kind = "web"
previewPath = "/"
title = "صيدليات الأسرة"
version = "1.0.0"
id = "artifacts/al-osra-pharmacy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21554

[services.development]
run = "pnpm --filter @workspace/al-osra-pharmacy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/al-osra-pharmacy", "run", "build" ]
publicDir = "artifacts/al-osra-pharmacy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21554"
BASE_PATH = "/"
